apiVersion: apps/v1
kind: Deployment
metadata:
  name: books-api
  namespace: bookstore
  labels:
    app: books-api
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: books-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: books-api
        tier: backend
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox
          command:
            - sh
            - -c
            - |
              until nc -z postgres-service 5432; do
                echo "Waiting for PostgreSQL..."
                sleep 3
              done
              echo "PostgreSQL is ready!"

      containers:
        - name: books-api
          image: gcr.io/google-samples/hello-app:1.0
          ports:
            - containerPort: 8080
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: bookstore-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: bookstore-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: bookstore-config
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: bookstore-secret
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bookstore-secret
                  key: DB_PASSWORD
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: log-volume
              mountPath: /var/log/books-api

        - name: log-sidecar
          image: busybox
          command:
            - sh
            - -c
            - |
              while true; do
                echo "[$(date)] books-api is running..." >> /var/log/books-api/app.log
                sleep 5
              done
          volumeMounts:
            - name: log-volume
              mountPath: /var/log/books-api

      volumes:
        - name: log-volume
          emptyDir: {}