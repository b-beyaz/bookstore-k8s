apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: bookstore
data:
  default.conf: |
    server {
      listen 80;
      server_name localhost;

      location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ =404;
      }

      location /books {
        proxy_pass http://books-api-service:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
      }

      location /orders {
        proxy_pass http://order-api-service:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
      }
    }